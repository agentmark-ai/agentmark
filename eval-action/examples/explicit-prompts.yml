name: Evals
on: pull_request

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: agentmark-ai/agentmark/eval-action@v1
        with:
          api-key: ${{ secrets.AGENTMARK_API_KEY }}
          # Evaluate a fixed set of prompts on every PR, regardless of which
          # files changed. Useful for golden-path test suites that should
          # always run.
          prompts: |
            prompts/translate.prompt.mdx
            prompts/summarize.prompt.mdx
            prompts/extract-entities.prompt.mdx
