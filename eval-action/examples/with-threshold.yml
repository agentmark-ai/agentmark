name: Evals
on: pull_request

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: agentmark-ai/agentmark/eval-action@v1
        with:
          api-key: ${{ secrets.AGENTMARK_API_KEY }}
          # Fail the PR if overall pass rate falls below 80%, in addition
          # to per-row failures already surfaced in the check panel.
          threshold: '80'
