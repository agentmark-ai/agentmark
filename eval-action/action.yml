name: 'AgentMark Eval Gate'
description: 'Run AgentMark evals on changed prompts and gate PRs on the results.'
author: 'AgentMark'
branding:
  icon: 'check-square'
  color: 'blue'

inputs:
  api-key:
    description: 'AgentMark API key. Required for cloud-backed runs; omit for fully local evals.'
    required: false
    default: ''
  prompts:
    description: |
      Space-separated list (or glob) of .prompt.mdx files to evaluate. If
      omitted, the action evaluates every .prompt.mdx file changed in the
      pull request diff.
    required: false
    default: ''
  threshold:
    description: |
      Optional pass-rate threshold (0-100). When set, the action fails the
      check if the overall pass rate across all evaluated rows is below this
      percentage, on top of per-row failures already surfaced by the JUnit
      report.
    required: false
    default: ''
  working-directory:
    description: 'Directory to run from. Defaults to the repository root.'
    required: false
    default: '.'
  results-glob:
    description: |
      Pattern used to name and discover the per-prompt JUnit XML outputs.
      Each evaluated prompt writes one file matching this glob; the publish
      step picks them all up.
    required: false
    default: 'agentmark-results-*.xml'
  cli-version:
    description: |
      npm version specifier for @agentmark-ai/cli. Defaults to the latest
      published version; pin to a specific version for reproducible CI.
    required: false
    default: 'latest'

outputs:
  results-glob:
    description: 'Glob matching the JUnit XML output files.'
    value: ${{ inputs.results-glob }}

runs:
  using: 'composite'
  steps:
    - name: Resolve prompts to evaluate
      id: resolve
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [ -n "${{ inputs.prompts }}" ]; then
          files="${{ inputs.prompts }}"
        else
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha || github.sha }}"
          if [ -z "$base" ] || [ -z "$head" ]; then
            echo "::warning::No PR base/head SHAs available — set inputs.prompts explicitly to evaluate a fixed set."
            files=""
          else
            files=$(git diff --name-only "$base...$head" -- '*.prompt.mdx' | tr '\n' ' ')
          fi
        fi
        if [ -z "$(echo "$files" | tr -d ' ')" ]; then
          echo "files=" >> "$GITHUB_OUTPUT"
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "No .prompt.mdx files to evaluate. Skipping."
        else
          echo "files=$files" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install AgentMark CLI
      if: steps.resolve.outputs.skip != 'true'
      shell: bash
      run: npm install -g @agentmark-ai/cli@${{ inputs.cli-version }}

    - name: Run evals
      id: run
      if: steps.resolve.outputs.skip != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        AGENTMARK_API_KEY: ${{ inputs.api-key }}
      run: |
        set -uo pipefail
        threshold_flag=""
        if [ -n "${{ inputs.threshold }}" ]; then
          threshold_flag="--threshold ${{ inputs.threshold }}"
        fi
        exit_status=0
        for file in ${{ steps.resolve.outputs.files }}; do
          # Filename-safe slug for the result file.
          slug=$(echo "$file" | tr '/' '-' | tr ' ' '_')
          out_file="agentmark-results-${slug}.xml"
          echo "::group::Evaluating $file"
          if agentmark run-experiment "$file" --format junit $threshold_flag > "$out_file"; then
            echo "  → wrote $out_file"
          else
            run_status=$?
            echo "  → wrote $out_file (CLI exit $run_status)"
            # Bubble up the worst exit code so the workflow reflects threshold gate failures.
            if [ $run_status -gt $exit_status ]; then
              exit_status=$run_status
            fi
          fi
          echo "::endgroup::"
        done
        exit $exit_status

    - name: Publish results
      if: always() && steps.resolve.outputs.skip != 'true'
      uses: mikepenz/action-junit-report@v5
      with:
        report_paths: ${{ inputs.working-directory }}/${{ inputs.results-glob }}
        check_name: 'AgentMark Evals'
        fail_on_failure: true
        require_tests: false
        annotate_only: false
        detailed_summary: true
