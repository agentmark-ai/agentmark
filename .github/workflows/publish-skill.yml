name: publish-skill

# Mirrors `skills/agentmark/` from this repo (agentmark-ai/agentmark) to
# the standalone distribution repo agentmark-ai/skills, so external users
# can install via `npx skills add agentmark-ai/skills`.
#
# Security review: no untrusted user-controllable inputs are interpolated
# into shell commands. The `${{ }}` substitutions used are:
#   - secrets.SKILLS_PUBLISH_TOKEN  (secret)
#   - github.sha                    (commit SHA, controlled by git)
#   - github.workflow, github.run_id (set by GH Actions, not user input)
# All shell uses go through env vars (`$SOURCE_SHA`) or heredocs with
# GH-Actions-controlled values, never directly interpolated.
#
# Setup (one-time, manual):
#   1. Generate a fine-grained PAT at github.com/settings/personal-access-tokens
#      scoped to agentmark-ai/skills with contents:write.
#   2. Save it as SKILLS_PUBLISH_TOKEN secret on this repo
#      (agentmark-ai/agentmark).

on:
  push:
    branches: [main]
    paths:
      - "skills/agentmark/**"
      - ".github/workflows/publish-skill.yml"
  workflow_dispatch:

concurrency:
  group: publish-skill
  cancel-in-progress: false

jobs:
  publish:
    name: Mirror skills/agentmark to agentmark-ai/skills
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      SOURCE_SHA: ${{ github.sha }}
      WORKFLOW_NAME: ${{ github.workflow }}
      RUN_ID: ${{ github.run_id }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 1

      - name: Check out destination
        uses: actions/checkout@v4
        with:
          repository: agentmark-ai/skills
          token: ${{ secrets.SKILLS_PUBLISH_TOKEN }}
          path: dest
          fetch-depth: 1

      - name: Sync skills/ tree (preserve dest README)
        run: |
          set -euo pipefail
          # Wipe the destination skills/ tree and replace with current source.
          # README + LICENSE in the dest repo root are NOT touched.
          rm -rf dest/skills
          cp -R source/skills dest/skills
          # Record provenance for traceability.
          {
            printf 'source: agentmark-ai/agentmark@%s\n' "$SOURCE_SHA"
            printf 'synced_at: %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            printf 'workflow: %s\n' "$WORKFLOW_NAME"
            printf 'run_id: %s\n' "$RUN_ID"
          } > dest/.sync-meta

      - name: Detect changes
        id: diff
        working-directory: dest
        run: |
          git config user.name "agentmark-skill-sync[bot]"
          git config user.email "noreply@agentmark.co"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No skill changes to mirror."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        working-directory: dest
        run: |
          set -euo pipefail
          short_sha="${SOURCE_SHA:0:7}"
          git commit -m "chore: sync from agentmark-ai/agentmark@${short_sha}

          Auto-generated by .github/workflows/publish-skill.yml.
          Source commit: agentmark-ai/agentmark@${SOURCE_SHA}"
          git push origin HEAD:main
