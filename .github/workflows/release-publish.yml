name: Publish Release

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  publish-npm:
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 21
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build all packages
        run: yarn build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push git tags
        run: |
          for pkg_json in packages/*/package.json; do
            pkg_name=$(jq -r '.name' "$pkg_json")
            pkg_version=$(jq -r '.version' "$pkg_json")
            is_private=$(jq -r '.private // false' "$pkg_json")

            # Skip private packages
            [ "$is_private" = "true" ] && continue

            tag="${pkg_name}@${pkg_version}"
            if ! git rev-parse "$tag" >/dev/null 2>&1; then
              echo "Creating tag: $tag"
              git tag "$tag"
            fi
          done
          git push --tags

      - name: Publish to npm
        run: npx nx release publish --groups js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Releases
        run: |
          for pkg_json in packages/*/package.json; do
            pkg_name=$(jq -r '.name' "$pkg_json")
            pkg_version=$(jq -r '.version' "$pkg_json")
            is_private=$(jq -r '.private // false' "$pkg_json")
            pkg_dir=$(dirname "$pkg_json")

            # Skip private packages
            [ "$is_private" = "true" ] && continue

            tag="${pkg_name}@${pkg_version}"

            # Check if release already exists
            if gh release view "$tag" &>/dev/null; then
              echo "Release $tag already exists, skipping"
              continue
            fi

            # Get changelog content if it exists
            changelog_file="$pkg_dir/CHANGELOG.md"
            if [ -f "$changelog_file" ]; then
              notes=$(awk '/^## '"$pkg_version"'/{flag=1; next} /^## [0-9]/{flag=0} flag' "$changelog_file")
            else
              notes="Release ${pkg_name}@${pkg_version}"
            fi

            echo "Creating release: $tag"
            gh release create "$tag" --title "$tag" --notes "$notes"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push git tags
        run: |
          PYTHON_PACKAGES=(
            "packages/sdk-python:agentmark-sdk"
            "packages/prompt-core-python:agentmark-prompt-core"
            "packages/templatedx-python:agentmark-templatedx"
            "packages/claude-agent-sdk-v0-adapter-python:agentmark-claude-agent-sdk-v0"
            "packages/pydantic-ai-v0-adapter:agentmark-pydantic-ai-v0"
          )

          for entry in "${PYTHON_PACKAGES[@]}"; do
            pkg_dir="${entry%%:*}"
            pkg_name="${entry##*:}"

            [ -f "$pkg_dir/pyproject.toml" ] || continue

            pkg_version=$(python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('$pkg_dir/pyproject.toml').read_text())
          print(data['project']['version'])
          ")

            # Skip packages not ready for release
            [ "$pkg_version" = "0.0.0" ] && continue

            tag="${pkg_name}@${pkg_version}"
            if ! git rev-parse "$tag" >/dev/null 2>&1; then
              echo "Creating tag: $tag"
              git tag "$tag"
            fi
          done
          git push --tags

      - name: Build and publish Python packages
        run: |
          PYTHON_PACKAGES=(
            "packages/sdk-python:agentmark-sdk"
            "packages/prompt-core-python:agentmark-prompt-core"
            "packages/templatedx-python:agentmark-templatedx"
            "packages/claude-agent-sdk-v0-adapter-python:agentmark-claude-agent-sdk-v0"
            "packages/pydantic-ai-v0-adapter:agentmark-pydantic-ai-v0"
          )

          for entry in "${PYTHON_PACKAGES[@]}"; do
            pkg_dir="${entry%%:*}"
            pkg_name="${entry##*:}"

            if [ ! -f "$pkg_dir/pyproject.toml" ]; then
              echo "⚠ $pkg_dir/pyproject.toml not found, skipping"
              continue
            fi

            pkg_version=$(python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('$pkg_dir/pyproject.toml').read_text())
          print(data['project']['version'])
          ")

            echo "--- $pkg_name $pkg_version ---"

            if [ "$pkg_version" = "0.0.0" ]; then
              echo "Skipping $pkg_name (version 0.0.0, not ready)"
              continue
            fi

            if pip index versions "$pkg_name" 2>/dev/null | grep -q "$pkg_version"; then
              echo "Skipping $pkg_name $pkg_version (already on PyPI)"
              continue
            fi

            echo "Building $pkg_name $pkg_version"
            python -m build "$pkg_dir" --outdir "$pkg_dir/dist"

            echo "Publishing $pkg_name $pkg_version"
            twine upload "$pkg_dir/dist/"*
          done
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: Create GitHub Releases
        run: |
          PYTHON_PACKAGES=(
            "packages/sdk-python:agentmark-sdk"
            "packages/prompt-core-python:agentmark-prompt-core"
            "packages/templatedx-python:agentmark-templatedx"
            "packages/claude-agent-sdk-v0-adapter-python:agentmark-claude-agent-sdk-v0"
            "packages/pydantic-ai-v0-adapter:agentmark-pydantic-ai-v0"
          )

          for entry in "${PYTHON_PACKAGES[@]}"; do
            pkg_dir="${entry%%:*}"
            pkg_name="${entry##*:}"

            [ -f "$pkg_dir/pyproject.toml" ] || continue

            pkg_version=$(python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('$pkg_dir/pyproject.toml').read_text())
          print(data['project']['version'])
          ")

            # Skip packages not ready for release
            [ "$pkg_version" = "0.0.0" ] && continue

            tag="${pkg_name}@${pkg_version}"

            # Check if release already exists
            if gh release view "$tag" &>/dev/null; then
              echo "Release $tag already exists, skipping"
              continue
            fi

            # Get changelog content if it exists
            changelog_file="$pkg_dir/CHANGELOG.md"
            if [ -f "$changelog_file" ]; then
              notes=$(awk '/^## '"$pkg_version"'/{flag=1; next} /^## [0-9]/{flag=0} flag' "$changelog_file")
            else
              notes="Release ${pkg_name}@${pkg_version}"
            fi

            # Fall back to generic note if changelog section was empty
            if [ -z "$notes" ]; then
              notes="Release ${pkg_name}@${pkg_version}"
            fi

            echo "Creating release: $tag"
            gh release create "$tag" --title "$tag" --notes "$notes"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
